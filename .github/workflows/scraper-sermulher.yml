name: Scraper SerMulher

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 pandas openpyxl lxml

      - name: Run scraper
        run: python sermulher_scraper.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dados-sermulher
          path: |
            dados_sermulher_cram.xlsx
            dados_sermulher_token.json
